<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Save Image As</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">Chrome extension</p>
      <h1>Save Image As</h1>
      <p class="body">
        Right-click any image on a page, open <strong>Save image as</strong>, then choose <strong>PNG</strong>, <strong>JPG</strong>, or <strong>WebP</strong>.
      </p>
      <button id="open-settings" type="button">Open settings</button>
    </main>

    <script src="popup.js"></script>
  </body>
  </html>
